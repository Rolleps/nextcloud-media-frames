name: Build & publish release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build app package
        run: |
          APP_ID=media_frames
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"   # strip leading 'v'

          # Create clean package directory
          mkdir -p /tmp/build/${APP_ID}
          rsync -a --exclude='.git' --exclude='.github' \
            --exclude='node_modules' --exclude='vendor-bin' \
            --exclude='tests' --exclude='*.xcf' --exclude='docker-compose.yml' \
            --exclude='psalm.xml' --exclude='.eslintrc.js' \
            . /tmp/build/${APP_ID}/

          # Create tarball
          cd /tmp/build
          tar -czf ${APP_ID}-${VERSION}.tar.gz ${APP_ID}
          echo "TARBALL=/tmp/build/${APP_ID}-${VERSION}.tar.gz" >> $GITHUB_ENV
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "APP_ID=${APP_ID}" >> $GITHUB_ENV

      - name: Sign the package
        env:
          NC_PRIVATE_KEY: ${{ secrets.NC_PRIVATE_KEY }}
        run: |
          echo "$NC_PRIVATE_KEY" > /tmp/media_frames.key
          openssl dgst -sha512 -sign /tmp/media_frames.key "$TARBALL" \
            | openssl base64 -A > /tmp/signature.txt
          echo "SIGNATURE=$(cat /tmp/signature.txt)" >> $GITHUB_ENV
          rm /tmp/media_frames.key

      - name: Upload tarball to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "$TARBALL" --clobber

      - name: Publish to Nextcloud App Store
        env:
          NC_API_TOKEN: ${{ secrets.NC_API_TOKEN }}
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/${APP_ID}-${APP_VERSION}.tar.gz"

          curl -X POST \
            -H "Authorization: Token ${NC_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"download\": \"${DOWNLOAD_URL}\", \"signature\": \"${SIGNATURE}\"}" \
            https://apps.nextcloud.com/api/v1/apps/releases
